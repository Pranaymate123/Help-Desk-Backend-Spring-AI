spring:
  application:
    name:"help-desk-backend"
  datasource:
    url: jdbc:mysql://localhost:3306/help_desk_db?serverTimezone=UTC
    username: root
    password: 123
#    dbcp2:
#      driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
#    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
      show-sql: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini



    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

server:
  port: 8081

logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG





